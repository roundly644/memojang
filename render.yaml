services:
  - type: web
    name: memojang
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
